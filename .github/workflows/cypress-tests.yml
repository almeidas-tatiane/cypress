name: Cypress Tests

on: 
  workflow_dispatch: 
    inputs:
      cli:
        description: Run by cypress node command line
        default: node runner.js

jobs: 
  cypress-electron-tests:
    runs-on: ubuntu-latest
    container: 
      image: cypress/included:cypress-13.11.0-node-18.20.3-chrome-125.0.6422.141-1-ff-126.0.1-edge-125.0.2535.85-1
      options: --user 1001
    steps:
      - name: Get Code - Checkout
        uses: actions/checkout@v6.0.2

      - name: Install dependencies
        run: yarn install

      - name: Run E2E tests
        run: ${{ github.event.inputs.cli }}
