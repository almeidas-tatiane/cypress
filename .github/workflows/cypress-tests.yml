name: Cypress Tests

on: 
  workflow_dispatch: 


jobs: 
  cypress-electron-tests:
    runs-on: ubuntu-latest
    container: 
      image: cypress/included:15.13.0
      options: --user 1001
    steps:
      - name: Get Code - Checkout
        uses: actions/checkout@v6.0.2

      - name: Install dependencies
        run: yarn install

      - name: Run E2E tests
        run: node runner_electron.js
    env: 
      TARGET_TOKEN_ELECTRON: ${{  secrets.TARGET_TOKEN_ELECTRON  }}

  cypress-chrome-tests:
    needs: cypress-electron-tests
    runs-on: ubuntu-latest
    container: 
      image: cypress/included:15.13.0
      options: --user 1001
    steps:
      - name: Get Code - Checkout
        uses: actions/checkout@v6.0.2

      - name: Install dependencies
        run: yarn install

      - name: Run E2E tests
        run: node runner_chrome.js
    env: 
      TARGET_TOKEN_CHROME: ${{  secrets.TARGET_TOKEN_CHROME  }}

  cypress-firefox-tests:
    needs: cypress-electron-tests
    runs-on: ubuntu-latest
    container: 
      image: cypress/included:15.13.0
      options: --user 1001
    
    steps:
      - name: Get Code - Checkout
        uses: actions/checkout@v6.0.2

      - name: Install dependencies
        run: yarn install

      - name: Run E2E tests
        run: node runner_firefox.js
    env: 
      TARGET_TOKEN_FIREFOX: ${{  secrets.TARGET_TOKEN_FIREFOX  }}