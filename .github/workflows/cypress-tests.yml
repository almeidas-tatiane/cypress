name: Cypress Tests

on: 
  workflow_dispatch: 
    inputs:
      cli:
        description: Run by cypress node command line
        default: node runner.js

jobs: 
  cypress-electron-tests:
    runs-on: ubuntu-latest
    container: 
      image: cypress/included:cypress-15.13.0-node-24.14.1-chrome-146.0.7680.164-1-ff-149.0-edge-146.0.3856.72-1
      options: --user 1001
    steps:
      - name: Get Code - Checkout
        uses: actions/checkout@v6.0.2

      - name: Install dependencies
        run: yarn install

      - name: Run E2E tests
        run: ${{ github.event.inputs.cli }}
